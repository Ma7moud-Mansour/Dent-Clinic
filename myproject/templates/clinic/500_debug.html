{% extends 'clinic/dashboard_layout.html' %}

{% block title %}Error Debug{% endblock %}
{% block header_title %}Error{% endblock %}

{% block page_content %}
<div class="p-10">
    <h1 class="text-2xl font-bold text-red-600 mb-4">Internal Server Error (Debug)</h1>
    <div class="bg-red-50 p-6 rounded-lg border border-red-200">
        <p class="font-mono text-sm whitespace-pre-wrap">{{ error }}</p>
    </div>
    <a href="{% url 'invoices_list' %}" class="mt-6 inline-block text-primary hover:underline">Return to Invoices</a>
</div>
{% endblock %}
